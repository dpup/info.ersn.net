syntax = "proto3";

package api.v1;

import "google/api/annotations.proto";
import "google/protobuf/timestamp.proto";
import "protoc-gen-openapiv2/options/annotations.proto";
import "common.proto";

option go_package = "github.com/dpup/info.ersn.net/server/api/v1";

// OpenAPI configuration
option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_swagger) = {
  info: {
    title: "ERSN Weather API";
    version: "1.0";
    description: "Real-time weather conditions and alerts for the Ebbetts Pass region";
    contact: {
      name: "ERSN Info Server";
      url: "https://info.ersn.net";
    };
  };
  external_docs: {
    url: "https://github.com/dpup/info.ersn.net";
    description: "More about ERSN Info Server";
  };
  schemes: HTTPS;
  schemes: HTTP;
  consumes: "application/json";
  produces: "application/json";
};

// WeatherService provides current weather conditions and alerts
service WeatherService {
  // ListWeather returns current weather for all configured locations
  rpc ListWeather(ListWeatherRequest) returns (ListWeatherResponse) {
    option (google.api.http) = {
      get: "/api/v1/weather"
    };
  }

  // GetLocationWeather returns weather for a specific location
  rpc GetLocationWeather(GetLocationWeatherRequest) returns (GetLocationWeatherResponse) {
    option (google.api.http) = {
      get: "/api/v1/weather/{location_id}"
    };
  }

  // ListWeatherAlerts returns active weather alerts for all locations
  rpc ListWeatherAlerts(ListWeatherAlertsRequest) returns (ListWeatherAlertsResponse) {
    option (google.api.http) = {
      get: "/api/v1/weather/alerts"
    };
  }
}

// Request messages
message ListWeatherRequest {}

message GetLocationWeatherRequest {
  string location_id = 1;
}

message ListWeatherAlertsRequest {
  // Optional NWS forecast zone filter (e.g. "CAZ064"). When provided, only
  // authoritative NWS alerts for these zones are returned. Repeat the param
  // (?zones=CAZ064&zones=CAZ065) or pass a comma-separated value.
  repeated string zones = 1;
}

// Response messages
message ListWeatherResponse {
  repeated WeatherData weather_data = 1;
  google.protobuf.Timestamp last_updated = 2;
  FireWeather fire_weather = 3;              // Region-wide fire-weather classification (NWS-derived)
}

message GetLocationWeatherResponse {
  WeatherData weather_data = 1;
  google.protobuf.Timestamp last_updated = 2;
  FireWeather fire_weather = 3;              // Region-wide fire-weather classification (NWS-derived)
}

message ListWeatherAlertsResponse {
  repeated WeatherAlert alerts = 1;
  google.protobuf.Timestamp last_updated = 2;
}

// Data models
message WeatherData {
  string location_id = 1;                    
  string location_name = 2;                  
  string weather_main = 3;                   // "Clear", "Rain", "Snow", etc.
  string weather_description = 4;            // "light rain", "clear sky", etc.
  string weather_icon = 5;                   // Icon code for display
  int32 temperature_celsius = 6;             // Temperature in Celsius (rounded)
  int32 feels_like_celsius = 7;              // Feels like temperature in Celsius (rounded)
  int32 humidity_percent = 8;                // Humidity percentage (0-100)
  int32 wind_speed_kmh = 9;                  // Wind speed in km/h (more user-friendly)
  int32 wind_direction_degrees = 10;         // Wind direction in degrees (0-360) 
  int32 visibility_km = 11;                  // Visibility distance in kilometers
  repeated WeatherAlert alerts = 12;         // Active weather alerts
  // Fire-weather is region-wide; it now lives on the response (ListWeatherResponse /
  // GetLocationWeatherResponse) instead of being duplicated on every location.
  reserved 13;
  reserved "fire_weather";
}

// FireWeather classifies fire-weather risk derived from authoritative NWS
// fire-weather products. It escalates Normal -> Elevated -> Red Flag. Red Flag
// is only reported when an NWS Red Flag Warning is actually in effect.
message FireWeather {
  FireWeatherState state = 1;                // normal | elevated | red-flag
  string source_event = 2;                   // Driving NWS product (e.g. "Red Flag Warning"); empty when normal
  string headline = 3;                       // Headline of the governing alert
  string sender_name = 4;                    // Issuing NWS office
  google.protobuf.Timestamp effective = 5;   // Start of the governing product
  google.protobuf.Timestamp expires = 6;     // End of the governing product
  repeated string zones = 7;                 // NWS zones the classification is based on
}


// Removed WeatherCondition - data is now directly in WeatherData message

message WeatherAlert {
  // Fields 4 and 5 were int64 unix start_timestamp/end_timestamp. They are now
  // start_time/end_time (google.protobuf.Timestamp) below, for one consistent
  // RFC3339 representation across the whole API. BREAKING: the JSON keys changed
  // from startTimestamp/endTimestamp (quoted unix seconds) to startTime/endTime
  // (RFC3339 strings).
  reserved 4, 5;
  reserved "start_timestamp", "end_timestamp";

  string id = 1;                             // Generated unique identifier
  string sender_name = 2;                    // Alert issuing organization
  string event = 3;                          // Alert event type ("Heat Advisory", "Winter Storm Warning")
  string description = 6;                    // Original NWS alert description (preserved for reference)
  repeated string tags = 7;                  // OpenWeatherMap alert tags

  // AI-enhanced fields for improved readability
  string headline = 8;                       // Single sentence summary, <100 chars
  string summary = 9;                        // 2-3 sentences, plain text, traveler-focused
  string details = 10;                       // Full description with minimal markdown formatting

  // Provenance / NWS fields
  AlertSource source = 11;                   // Which upstream feed produced the alert
  AlertSeverity severity = 12;               // Severity (NWS levels mapped onto the shared scale)
  repeated string zones = 13;                // NWS forecast zones this alert applies to (e.g. "CAZ064")

  google.protobuf.Timestamp start_time = 14; // When the alert becomes effective
  google.protobuf.Timestamp end_time = 15;   // When the alert expires
}

// Enumerations

// OpenWeatherMap alert tags (14 categories) - preserved as reference
// Actual alert classification is done via the "tags" string array field
// which contains the original OpenWeatherMap tag values:
// - "extreme temperature value", "fog", "high wind", "thunderstorms" 
// - "tornado", "hurricane/typhoon", "snow", "ice", "rain"
// - "coastal event", "volcano", "tsunami", "other"