syntax = "proto3";

package api.v1;

import "google/api/annotations.proto";
import "google/protobuf/timestamp.proto";
import "protoc-gen-openapiv2/options/annotations.proto";
import "common.proto";

option go_package = "github.com/dpup/info.ersn.net/server/api/v1";

// OpenAPI configuration
option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_swagger) = {
  info: {
    title: "ERSN Roads API";
    version: "1.0";
    description: "Real-time road conditions and traffic information for the Ebbetts Pass region";
    contact: {
      name: "ERSN Info Server";
      url: "https://info.ersn.net";
    };
  };
  external_docs: {
    url: "https://github.com/dpup/info.ersn.net";
    description: "More about ERSN Info Server";
  };
  schemes: HTTPS;
  schemes: HTTP;
  consumes: "application/json";
  produces: "application/json";
};

// RoadsService provides real-time road conditions and traffic information
service RoadsService {
  // ListRoads returns current conditions for all configured roads
  rpc ListRoads(ListRoadsRequest) returns (ListRoadsResponse) {
    option (google.api.http) = {
      get: "/api/v1/roads"
    };
  }

  // GetRoad returns current conditions for a specific road
  rpc GetRoad(GetRoadRequest) returns (GetRoadResponse) {
    option (google.api.http) = {
      get: "/api/v1/roads/{road_id}"
    };
  }

  // GetProcessingMetrics returns alert processing metrics
  rpc GetProcessingMetrics(GetProcessingMetricsRequest) returns (ProcessingMetrics) {
    option (google.api.http) = {
      get: "/api/v1/roads/metrics"
    };
  }

  // ListIncidents returns region-wide CHP/Caltrans dispatch incidents.
  // Unlike the alerts embedded in each Road, this is not scoped to a monitored
  // route - it surfaces every incident within a configured area (e.g.
  // ?area=mother-lode). Data comes from the same Caltrans/CHP KML feeds but is
  // returned as a flat, structured list without per-route classification or AI
  // enhancement (kept lightweight for a region-wide view).
  rpc ListIncidents(ListIncidentsRequest) returns (ListIncidentsResponse) {
    option (google.api.http) = {
      get: "/api/v1/incidents"
    };
  }
}

// Request messages
message ListRoadsRequest {}

message GetRoadRequest {
  string road_id = 1;
}

message GetProcessingMetricsRequest {}

// ListIncidentsRequest filters incidents to a configured area.
message ListIncidentsRequest {
  string area = 1;  // Area id (e.g. "mother-lode"). Empty defaults to the first configured area.
}

// Response messages
message ListRoadsResponse {
  repeated Road roads = 1;
  google.protobuf.Timestamp last_updated = 2;
}

message GetRoadResponse {
  Road road = 1;
  google.protobuf.Timestamp last_updated = 2;
}

message ListIncidentsResponse {
  repeated Incident incidents = 1;
  google.protobuf.Timestamp last_updated = 2;
  string area = 3;  // Echoes the resolved area id
}

// Incident is a region-wide CHP/Caltrans dispatch incident, surfaced
// independently of any monitored road.
message Incident {
  string id = 1;                          // Stable id (CHP log number when available)
  AlertType type = 2;                     // INCIDENT, CLOSURE, CONSTRUCTION
  AlertSeverity severity = 3;             // Heuristic severity from incident text
  Coordinates location = 4;              // Point location
  string location_description = 5;        // Human-readable location (e.g. "Sr132 Ofr / I580 E")
  string description = 6;                 // Incident detail text from the feed
  IncidentStatus status = 7;              // Lifecycle state (feeds only list active incidents)
  string log_number = 8;                  // CHP/CAD log number (e.g. "250916ST0066")
  google.protobuf.Timestamp started = 9;  // When the incident was first reported
  google.protobuf.Timestamp last_updated = 10; // Last update from the feed
  string area = 11;                       // Area id this incident was matched to
}

message ProcessingMetrics {
  int64 total_raw_alerts = 1;
  int64 filtered_alerts = 2;
  int64 enhanced_alerts = 3;
  int64 enhancement_failures = 4;
  double avg_processing_time_ms = 5;
}

// Data models
message Road {
  string id = 1;
  string name = 2;                       // Highway/road name (e.g., "Hwy 4")
  string section = 3;                    // Section description (e.g., "Arnold to Bear Valley")
  RoadStatus status = 4;                 // Current road status
  string status_explanation = 5;         // Explanation when status is RESTRICTED or CLOSED
  int32 duration_minutes = 6;            // Current travel time in minutes
  int32 distance_km = 7;                 // Route distance in kilometers
  CongestionLevel congestion_level = 8;  // Traffic congestion level
  int32 delay_minutes = 9;               // Additional time due to traffic (0 = no delays)
  ChainControlStatus chain_control = 10; // Chain control requirements (legacy, use chain_control_info)
  repeated RoadAlert alerts = 11;        // Combined from multiple sources
  ChainControlInfo chain_control_info = 12; // Detailed chain control information
}

// ChainControlInfo provides detailed chain control status for a road
message ChainControlInfo {
  ChainControlLevel level = 1;           // R1, R2, or NONE
  string location_name = 2;              // Where chain control starts (e.g., "Twin Bridges")
  double latitude = 3;                   // Latitude of chain control checkpoint
  double longitude = 4;                  // Longitude of chain control checkpoint
  google.protobuf.Timestamp effective_time = 5; // When chain control went into effect
  string direction = 6;                  // Direction of travel (e.g., "Eastbound")
  string description = 7;                // Human-readable requirements description
}


// TrafficCondition merged into Road for simplicity

message RoadAlert {
  AlertType type = 1;
  AlertSeverity severity = 2;
  AlertClassification classification = 3;  // On route vs nearby vs distant
  string title = 4;                        // Actual Caltrans title (e.g., "CHP Incident 250911GG0206")
  string description = 5;                  // AI-processed description
  string condensed_summary = 6;            // Short format for mobile
  google.protobuf.Timestamp start_time = 7;
  google.protobuf.Timestamp end_time = 8;
  google.protobuf.Timestamp last_updated = 9;
  Coordinates location = 10;               // Structured location with lat/lon
  string location_description = 11;        // Human-friendly location description
  AlertImpact impact = 12;                 // AI-assessed impact
  AlertDuration duration = 13;             // AI-assessed duration
  google.protobuf.Timestamp time_reported = 14;  // When incident was first reported
  map<string, string> metadata = 15;      // Additional AI-generated key-value pairs only
  double distance_to_route_meters = 16;   // Distance from alert location to route in meters (for NEARBY alerts)
  // Note: id, original_description removed for cleaner API
  // Note: affected_segments, affected_polyline, structured_data, enhancement_info,
  // and affected_route_ids are kept internal for processing
}

// Note: StructuredDescription and EnhancementMetadata removed - AI-enhanced data 
// now goes into the generic metadata map for simpler API structure

message TrafficIncident {
  string id = 1;
  string description = 2;
  float location_mile_marker = 3;
  int32 estimated_delay_minutes = 4;
}

// Enumerations
enum RoadStatus {
  ROAD_STATUS_UNSPECIFIED = 0;
  OPEN = 1;
  CLOSED = 2;
  RESTRICTED = 3;
  MAINTENANCE = 4;
}

enum ChainControlStatus {
  CHAIN_CONTROL_UNSPECIFIED = 0;
  NONE = 1;
  ADVISED = 2;
  REQUIRED = 3;
  PROHIBITED = 4;
}

// ChainControlLevel indicates the specific chain control requirement level
enum ChainControlLevel {
  CHAIN_CONTROL_LEVEL_UNSPECIFIED = 0;
  CHAIN_CONTROL_LEVEL_NONE = 1;          // No chain control in effect
  CHAIN_CONTROL_LEVEL_R1 = 2;            // Chains required except vehicles with snow tires
  CHAIN_CONTROL_LEVEL_R2 = 3;            // Chains required except 4WD/AWD with snow tires on all wheels
  CHAIN_CONTROL_LEVEL_R3 = 4;            // Chains required on all vehicles, no exceptions
}

enum CongestionLevel {
  CONGESTION_LEVEL_UNSPECIFIED = 0;
  CLEAR = 1;
  LIGHT = 2;
  MODERATE = 3;
  HEAVY = 4;
  SEVERE = 5;
}

enum AlertType {
  ALERT_TYPE_UNSPECIFIED = 0;
  CLOSURE = 1;
  CONSTRUCTION = 2;
  INCIDENT = 3;
  WEATHER = 4;
}

// AlertSeverity moved to common.proto (shared with the weather API).

enum AlertClassification {
  ALERT_CLASSIFICATION_UNSPECIFIED = 0;
  ON_ROUTE = 1;      // Directly affects route path (< 100m from route)
  NEARBY = 2;        // In surrounding area but not blocking route (< route threshold)
  DISTANT = 3;       // Too far from route to be relevant (> route threshold)
}
