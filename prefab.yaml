server:
  port: 8181  # Local dev port. Production (Docker/ECS) overrides via PF__SERVER__PORT=8080.
  security:
    xFrameOptions: DENY  # X-Frame-Options header

    # CORS settings
    # NOTE: Prefab only emits Access-Control-Allow-Origin when the request's
    # Origin header exactly matches an entry below (see prefab security.go).
    # Browser clients must be listed here explicitly to make cross-origin fetch work.
    corsOrigins:
      - https://ersn.net
      - https://www.ersn.net         # ersn.net site (www host is a distinct origin)
      - https://sierragridteam.org   # S.I.E.R.R.A site consuming /roads, /weather, /weather/alerts (issue #3)
      - https://www.sierragridteam.org
      - http://localhost:8181
      - http://localhost:4321
      - http://localhost:4322
    # NOTE: keys must be corsAllowMethods / corsAllowHeaders (no "ed") - those are
    # what Prefab reads (server.security.corsAllowMethods). The misspelled
    # corsAllowedMethods/corsAllowedHeaders were silently ignored, leaving the
    # permissive defaults (all methods) in place.
    corsAllowMethods:
      - GET
    corsAllowHeaders:
      - content-type
      - x-requested-with
      - x-csrf-protection
    # This API requires no authentication and uses no cookies, so credentialed
    # CORS is unnecessary. Keeping it false also leaves the door open to a
    # wildcard origin later if desired.
    corsAllowCredentials: false
    corsMaxAge: 72h

    # HSTS settings
    hstsExpiration: 31536000s
    hstsIncludeSubdomains: true
    hstsPreload: true

# Client Configurations - Top Level  
google_routes:
  apiKey: "" 

openai:
  apiKey: ""
  model: "gpt-4o-mini"       # OpenAI model for alert enhancement with JSON schema support
  timeout: "30s"             # Timeout for API calls
  maxRetries: 3              # Maximum retry attempts

openweather:
  apiKey: ""

# Service Configurations
roads:
  # Google Routes calls are gated by a 45m per-road cache (see roads.go), not this
  # interval, to stay under the Compute Routes Pro free tier (5,000/month). The
  # request uses TRAFFIC_AWARE_OPTIMAL (Pro) but NOT traffic-on-polyline (Enterprise).
  refreshInterval: "15m"
  staleThreshold: "30m"   # Increased to accept slightly stale data
  
  caltransFeeds:
    laneClosures:
      refreshInterval: "10m"
      url: "https://quickmap.dot.ca.gov/data/lcs2way.kml"
    chpIncidents:
      refreshInterval: "5m"   # More frequent, incidents change quickly
      url: "https://quickmap.dot.ca.gov/data/chp-only.kml"
    roadConditions:
      refreshInterval: "10m"  # Caltrans road conditions page (closures, chain controls)
      url: "https://roads.dot.ca.gov/roadscell.php?roadnumber=%s"

  # Named regions for the region-wide incidents feed (issue #7):
  #   GET /api/v1/incidents/mother-lode
  # The CHP/Caltrans KML feeds are statewide; bounds keep this scoped to the
  # Gold Country foothills (Amador/Calaveras/Tuolumne/Mariposa/El Dorado),
  # excluding the Central Valley floor (Stockton/Sacramento/Modesto).
  incidentAreas:
    - id: "mother-lode"
      name: "Mother Lode"
      bounds:
        minLatitude: 37.3
        maxLatitude: 39.0
        minLongitude: -121.15
        maxLongitude: -119.5

  monitoredRoads:
    - name: "Hwy 4"
      section: "Angels Camp to Murphys"
      id: "hwy4-angels-murphys"
      origin:
        latitude: 38.067400
        longitude: -120.540200
      destination:
        latitude: 38.139117
        longitude: -120.456111
      locationKeywords: ["Vallecito", "Douglas Flat", "Copperopolis"]
    - name: "Hwy 4"
      section: "Murphys to Arnold"
      id: "hwy4-murphys-arnold"
      origin:
        latitude: 38.139117
        longitude: -120.456111
      destination:
        latitude: 38.265006
        longitude: -120.333654
      locationKeywords: ["Avery", "Hathaway Pines"]
    - name: "Hwy 4"
      section: "Arnold to Bear Valley"
      id: "hwy4-arnold-bearvalley"
      origin:
        latitude: 38.265006
        longitude: -120.333654
      destination:
        latitude: 38.461045
        longitude: -120.042368
      locationKeywords: ["Camp Connell", "Dorrington", "White Pines", "Big Trees", "Ganns", "Tamarack", "Lake Alpine", "Mt Reba", "Ebbetts"]
    # Hwy 49 / Tuolumne corridor (issue #6). Angels Camp <-> Sonora links the
    # Calaveras and Tuolumne service areas. Note: the upper Hwy 4 segment past
    # Arnold (Dorrington) is already covered by "Arnold to Bear Valley" above,
    # which Google routes through Dorrington.
    - name: "Hwy 49"
      section: "Angels Camp to Sonora"
      id: "hwy49-angels-sonora"
      origin:
        latitude: 38.067400
        longitude: -120.540200
      destination:
        latitude: 37.984100
        longitude: -120.382700
    # Useful for testing because it is always busy and often has incidents.
    # - name: "101"
    #   section: "SF to Oakland"
    #   id: "101-sf-oakland"
    #   origin:
    #     latitude: 37.774929
    #     longitude: -122.419418
    #   destination:
    #     latitude: 37.792769
    #     longitude: -122.262866

weather:
  refreshInterval: "5m"
  staleThreshold: "10m"

  # National Weather Service zone alerts (issue #4) + fire-weather
  # classification (issue #5). These foothill/mountain zones cover the
  # Calaveras & Tuolumne service area. NWS requires a descriptive User-Agent
  # (no API key). See https://www.weather.gov/documentation/services-web-api
  nws:
    userAgent: "info.ersn.net (https://info.ersn.net)"
    zones:
      - CAZ064   # Calaveras foothills
      - CAZ065   # Calaveras mountains
      - CAZ258   # Tuolumne foothills
      - CAZ259   # Tuolumne mountains

  locations:
    - id: "murphys"
      name: "Murphys, CA"
      coordinates:
        latitude: 38.139117
        longitude: -120.456111
    - id: "arnold"  
      name: "Arnold, CA"
      coordinates:
        latitude: 38.265006
        longitude: -120.333654
    - id: "bearvalley"
      name: "Bear Valley, CA"
      coordinates:
        latitude: 38.461045
        longitude: -120.042368
    # Hwy 49 / Tuolumne corridor towns (issue #6). OpenWeather is well within
    # its free-tier rate limit so adding locations here is cheap.
    - id: "sonora"
      name: "Sonora, CA"
      coordinates:
        latitude: 37.984100
        longitude: -120.382700
    - id: "columbia"
      name: "Columbia, CA"
      coordinates:
        latitude: 38.034900
        longitude: -120.401600
    - id: "twainharte"
      name: "Twain Harte, CA"
      coordinates:
        latitude: 38.038300
        longitude: -120.229400
    - id: "dorrington"
      name: "Dorrington, CA"
      coordinates:
        latitude: 38.333800
        longitude: -120.271300

# Unified hazard/situation feed (docs/hazard-aggregation-design.md). Powers
# GET /api/v1/hazards/{area}/{layer}.geojson — standardized GeoJSON for map clients.
hazards:
  areas:
    - id: "calaveras"
      name: "Calaveras County"
      bounds:
        minLatitude: 37.8
        maxLatitude: 38.55
        minLongitude: -120.9
        maxLongitude: -120.0
      incidentArea: "mother-lode"   # reuse the roads incidents region filter
      evacCounties: ["Calaveras", "Tuolumne", "Amador"]
      scannerFeeds:
        - { feedId: "13524", channelLabel: "Sheriff / CAL FIRE Dispatch", agency: "Calaveras SO / CAL FIRE" }
        - { feedId: "28469", channelLabel: "Fire / USFS", agency: "CAL FIRE / USFS" }
        - { feedId: "41042", channelLabel: "CAL FIRE TCU / USFS", agency: "CAL FIRE TCU" }
        - { feedId: "45443", channelLabel: "CHP — Stockton", agency: "CHP" }